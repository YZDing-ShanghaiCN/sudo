environment:
  robot:
    arm_name: hillbot_right
    wall: [-0.05, -1.6, 0.6, 100, 0.3, 2.0]
  gripper:
    mesh: assets/mesh/scene_00/tool/gripper.ply
    standard_tcp_rotation:
      - [0, 0, 1]
      - [1, 0, 0]
      - [0, 1, 0]
    standard_tcp_transition: [0.5, -0.1, 1.3]
  tote:
    mesh: assets/mesh/scene_00/obstacle/convex/crate_0.ply
    base_position:
      - [1, 0, 0, 0.75]
      - [0, 1, 0, -0.2]
      - [0, 0, 1, 0.7]
      - [0, 0, 0, 1]
    resolution:
      - [0.05, 0.05, 0.05]
    tcp_range:
    # min max step
      x: [-0.3, 0.3, 0.05]
      y: [-0.2, 0.2, 0.05]
      z: [0.015, 0.25, 0.05]
      rotation_in_range: true
      # rx: [-pi/2, -pi/2, 0.1]
      rx: [-pi/8, pi/8, pi/8]
      # ry: [-pi/8, -pi/8, pi/16]
      ry: [3*pi/8, 5*pi/8, pi/8]
      rz: [0, 2*pi, pi/2]
      eps: 0.025
collision_check:
  create_pcd: true
  pcd_dx: 0.0025
ik:
  nb_redundant_search: 512
