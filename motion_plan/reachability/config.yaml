environment:
  robot:
    arm_name: hillbot_right
    wall: [-0.05, -1.6, 0.6, 100, 0.3, 2.0]
  gripper:
    mesh: motion_plan/assets/mesh/scene_00/tool/gripper.ply
    standard_tcp_rotation:
      - [0, 0, 1]
      - [1, 0, 0]
      - [0, 1, 0]
    standard_tcp_transition: [0.5, -0.1, 1.3]
  tote:
    mesh: motion_plan/assets/mesh/scene_00/obstacle/convex/crate_0.ply
    base_position:
      - [1, 0, 0, 0.75]
      - [0, 1, 0, -0.2]
      - [0, 0, 1, 0.7]
      - [0, 0, 0, 1]
    self_range:
      x: [0.7, 0.8, 0.05]
      y: [-0.2, -0.1, 0.05]
      z: [0.5, 0.9, 0.05]
    tcp_range:
    # min max step
      x: [-0.3, 0.3, 0.025]
      y: [-0.2, 0.2, 0.025]
      z: [0.015, 0.25, 0.05]
      rotation_in_range: true
      rx: [-pi/2, pi/2, pi/4]
      ry: [-pi/2, pi/2, pi/4]
      rz: [0, pi, pi/4]
      eps: 0.025
collision_check:
  create_pcd: true
  pcd_dx: 0.0025
ik:
  nb_redundant_search: 512
